## HTTPS Configuration
# https://docs.posit.co/connect/admin/appendix/configuration/#HTTPS

# @var connect_https_enabled:type: boolean
# @var connect_https_enabled:description: Enable HTTPS listener
connect_https_enabled: false
# @var connect_https_listen:type: string
# @var connect_https_listen:description: Address and port to listen on for HTTPS (e.g., :443 or 0.0.0.0:443)
connect_https_listen: ':443'
# @var connect_https_unix_domain_socket:type: string
# @var connect_https_unix_domain_socket:description: Unix domain socket for HTTPS
connect_https_unix_domain_socket: ''
# @var connect_https_key:type: string
# @var connect_https_key:description: Path to SSL private key file
connect_https_key: ''
# @var connect_https_certificate:type: string
# @var connect_https_certificate:description: Path to SSL certificate file
connect_https_certificate: ''
# @var connect_https_minimum_tls:type: string
# @var connect_https_minimum_tls:description: Minimum TLS version (1.0, 1.1, 1.2, 1.3)
connect_https_minimum_tls: '1.2'
# @var connect_https_permanent:type: boolean
# @var connect_https_permanent:description: Enforce HTTPS permanently (HSTS)
connect_https_permanent: false
# @var connect_https_strict_transport_security_max_age:type: string
# @var connect_https_strict_transport_security_max_age:description: HSTS max-age value
connect_https_strict_transport_security_max_age: '2592000s'
