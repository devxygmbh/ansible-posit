## Authentication Configuration
# https://docs.posit.co/connect/admin/appendix/configuration/#Authentication

# @var connect_auth_provider:type: string
# @var connect_auth_provider:description: Authentication provider (password, ldap, pam, oauth2, saml, proxy)
connect_auth_provider: password
# @var connect_auth_name:type: string
# @var connect_auth_name:description: Display name for authentication provider
connect_auth_name: 'Posit Connect'
# @var connect_auth_lifetime:type: string
# @var connect_auth_lifetime:description: Session lifetime duration
connect_auth_lifetime: '24h'
# @var connect_auth_inactivity:type: string
# @var connect_auth_inactivity:description: Session inactivity timeout
connect_auth_inactivity: '8h'
# @var connect_auth_api_key_auth:type: boolean
# @var connect_auth_api_key_auth:description: Enable API key authentication
connect_auth_api_key_auth: true

## PAM Configuration
# @var connect_auth_pam_service:type: string
# @var connect_auth_pam_service:description: PAM service name
connect_auth_pam_service: rstudio-connect
# @var connect_auth_pam_forward_password:type: boolean
# @var connect_auth_pam_forward_password:description: Forward user password to session
connect_auth_pam_forward_password: false
# @var connect_auth_pam_use_session:type: boolean
# @var connect_auth_pam_use_session:description: Enable PAM session management
connect_auth_pam_use_session: true
# @var connect_auth_pam_required_group:type: string
# @var connect_auth_pam_required_group:description: Local Linux group whose members are permitted to authenticate via PAM. Empty string disables the restriction. With Provider=pam this gates login. With Provider=oauth2/saml it gates PAM-managed sessions (RunAsCurrentUser content), not login - login restriction with OIDC/SAML must be enforced at the IdP. Setting this also forces the PAM service file to be deployed.
connect_auth_pam_required_group: ''

## OAuth2/OIDC Configuration
# @var connect_auth_oauth2_client_id:type: string
# @var connect_auth_oauth2_client_id:description: OAuth2 client ID
connect_auth_oauth2_client_id: ''
# @var connect_auth_oauth2_client_secret:type: string
# @var connect_auth_oauth2_client_secret:description: OAuth2 client secret
connect_auth_oauth2_client_secret: ''
# @var connect_auth_oauth2_openid_issuer:type: string
# @var connect_auth_oauth2_openid_issuer:description: OpenID Connect issuer URL
connect_auth_oauth2_openid_issuer: ''
# @var connect_auth_oauth2_scopes:type: string
# @var connect_auth_oauth2_scopes:description: OAuth2 scopes (space-separated)
connect_auth_oauth2_scopes: 'openid profile email'
# @var connect_auth_oauth2_unique_id_claim:type: string
# @var connect_auth_oauth2_unique_id_claim:description: Claim to use as unique user identifier
connect_auth_oauth2_unique_id_claim: sub
# @var connect_auth_oauth2_email_claim:type: string
# @var connect_auth_oauth2_email_claim:description: Claim to use for email address
connect_auth_oauth2_email_claim: email
# @var connect_auth_oauth2_username_claim:type: string
# @var connect_auth_oauth2_username_claim:description: Claim to use for username
connect_auth_oauth2_username_claim: preferred_username
# @var connect_auth_oauth2_first_name_claim:type: string
# @var connect_auth_oauth2_first_name_claim:description: Claim to use for first name
connect_auth_oauth2_first_name_claim: given_name
# @var connect_auth_oauth2_last_name_claim:type: string
# @var connect_auth_oauth2_last_name_claim:description: Claim to use for last name
connect_auth_oauth2_last_name_claim: family_name
# @var connect_auth_oauth2_groups_claim:type: string
# @var connect_auth_oauth2_groups_claim:description: Claim that contains the user's group memberships (e.g. 'groups'). Empty string disables group import. Requires the corresponding scope to be requested via connect_auth_oauth2_scopes.
connect_auth_oauth2_groups_claim: ''
# @var connect_auth_oauth2_groups_auto_provision:type: boolean
# @var connect_auth_oauth2_groups_auto_provision:description: Automatically create Connect groups encountered in the groups claim on user login
connect_auth_oauth2_groups_auto_provision: true
# @var connect_auth_oauth2_registration_domain_allow_list:type: string
# @var connect_auth_oauth2_registration_domain_allow_list:description: Comma-separated list of email domains permitted to register (e.g. 'example.com,example.org'). Empty string allows all domains.
connect_auth_oauth2_registration_domain_allow_list: ''
# @var connect_auth_oauth2_register_on_first_login:type: boolean
# @var connect_auth_oauth2_register_on_first_login:description: Auto-register users on first login
connect_auth_oauth2_register_on_first_login: true

## SAML Configuration
# @var connect_auth_saml_idp_metadata_url:type: string
# @var connect_auth_saml_idp_metadata_url:description: SAML IdP metadata URL
connect_auth_saml_idp_metadata_url: ''
# @var connect_auth_saml_idp_metadata_path:type: string
# @var connect_auth_saml_idp_metadata_path:description: Path to SAML IdP metadata file
connect_auth_saml_idp_metadata_path: ''
# @var connect_auth_saml_sp_entity_id:type: string
# @var connect_auth_saml_sp_entity_id:description: SAML Service Provider Entity ID
connect_auth_saml_sp_entity_id: ''
# @var connect_auth_saml_unique_id_attribute:type: string
# @var connect_auth_saml_unique_id_attribute:description: SAML attribute for unique user ID
connect_auth_saml_unique_id_attribute: NameID
# @var connect_auth_saml_username_attribute:type: string
# @var connect_auth_saml_username_attribute:description: SAML attribute for username
connect_auth_saml_username_attribute: ''
# @var connect_auth_saml_email_attribute:type: string
# @var connect_auth_saml_email_attribute:description: SAML attribute for email
connect_auth_saml_email_attribute: ''

## LDAP Configuration
# @var connect_auth_ldap_server_address:type: string
# @var connect_auth_ldap_server_address:description: LDAP server address (ldap:// or ldaps://)
connect_auth_ldap_server_address: ''
# @var connect_auth_ldap_bind_dn:type: string
# @var connect_auth_ldap_bind_dn:description: LDAP bind DN
connect_auth_ldap_bind_dn: ''
# @var connect_auth_ldap_bind_password:type: string
# @var connect_auth_ldap_bind_password:description: LDAP bind password
connect_auth_ldap_bind_password: ''
# @var connect_auth_ldap_user_search_base_dn:type: string
# @var connect_auth_ldap_user_search_base_dn:description: LDAP user search base DN
connect_auth_ldap_user_search_base_dn: ''
# @var connect_auth_ldap_user_object_class:type: string
# @var connect_auth_ldap_user_object_class:description: LDAP user object class
connect_auth_ldap_user_object_class: posixAccount
# @var connect_auth_ldap_user_unique_id_attribute:type: string
# @var connect_auth_ldap_user_unique_id_attribute:description: LDAP attribute for unique user ID
connect_auth_ldap_user_unique_id_attribute: uid
# @var connect_auth_ldap_user_email_attribute:type: string
# @var connect_auth_ldap_user_email_attribute:description: LDAP attribute for email
connect_auth_ldap_user_email_attribute: mail
# @var connect_auth_ldap_user_first_name_attribute:type: string
# @var connect_auth_ldap_user_first_name_attribute:description: LDAP attribute for first name
connect_auth_ldap_user_first_name_attribute: givenName
# @var connect_auth_ldap_user_last_name_attribute:type: string
# @var connect_auth_ldap_user_last_name_attribute:description: LDAP attribute for last name
connect_auth_ldap_user_last_name_attribute: sn
# @var connect_auth_ldap_group_search_base_dn:type: string
# @var connect_auth_ldap_group_search_base_dn:description: LDAP group search base DN
connect_auth_ldap_group_search_base_dn: ''
# @var connect_auth_ldap_group_object_class:type: string
# @var connect_auth_ldap_group_object_class:description: LDAP group object class
connect_auth_ldap_group_object_class: posixGroup
