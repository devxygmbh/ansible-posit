# Install Posit Connect from JFrog Artifactory
# This task file is used when connect_artifactory_enabled is true

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Warn if rstudio-connect service is in a failed state
  when:
    - "'services' in ansible_facts and 'rstudio-connect.service' in ansible_facts.services"
    - ansible_facts.services['rstudio-connect.service'].status == 'failed'
  ansible.builtin.debug:
    msg: 'WARNING: rstudio-connect service is in a failed state.'

- name: Initialize installed version variable
  ansible.builtin.set_fact:
    installed_connect_version:
      stdout: '0.0.0'

- name: Check rstudio-connect version when service exists
  when: "'services' in ansible_facts and 'rstudio-connect.service' in ansible_facts.services"
  ansible.builtin.command: '/opt/rstudio-connect/bin/connect --version'
  register: installed_connect_version
  changed_when: false
  ignore_errors: true

- name: Set safe variables for check mode
  ansible.builtin.set_fact:
    installed_connect_version:
      stdout: '0.0.0'
  when: ansible_check_mode

- name: Install Connect from Artifactory
  when:
    - not ansible_check_mode
    - "'services' not in ansible_facts or 'rstudio-connect.service' not in ansible_facts.services or (installed_connect_version.stdout | default('0.0.0')).split()[0] != connect_general_version"
  block:
    - name: Define environment facts for Connect download
      ansible.builtin.set_fact:
        binary_type: "{{ 'rpm' if ansible_facts['os_family'] == 'RedHat' else 'deb' }}"
        version_major_minor: "{{ connect_general_version.split('.')[0] }}.{{ connect_general_version.split('.')[1] }}"
        os_identifier: "{{ 'el' if ansible_facts['os_family'] == 'RedHat' else 'ubuntu' }}"
        os_major: '{{ ansible_distribution_major_version }}'
        arch: "{{ 'arm64' if ansible_architecture == 'aarch64' and ansible_facts['os_family'] == 'Debian' else 'aarch64' if ansible_architecture == 'aarch64' and ansible_facts['os_family'] == 'RedHat' else 'x86_64' if ansible_architecture == 'x86_64' and ansible_facts['os_family'] == 'RedHat' else 'amd64' }}"

    - name: Construct Artifactory URL for Posit Connect (RedHat)
      when: ansible_facts['os_family'] == 'RedHat'
      ansible.builtin.set_fact:
        connect_download_url: '{{ connect_artifactory_base_url }}/{{ connect_artifactory_posit_repo }}/{{ version_major_minor }}/rstudio-connect-{{ connect_general_version }}.el{{ os_major }}.{{ arch }}.rpm'

    - name: Construct Artifactory URL for Posit Connect (Ubuntu)
      when: ansible_distribution == 'Ubuntu'
      ansible.builtin.set_fact:
        connect_download_url: '{{ connect_artifactory_base_url }}/{{ connect_artifactory_posit_repo }}/{{ version_major_minor }}/rstudio-connect_{{ connect_general_version }}~ubuntu{{ os_major }}_{{ arch }}.deb'

    - name: Download Posit Connect from Artifactory
      ansible.builtin.get_url:
        url: '{{ connect_download_url }}'
        dest: '/tmp/connect-{{ connect_general_version }}.{{ binary_type }}'
        mode: '0775'
        timeout: 120
        url_username: '{{ connect_artifactory_username if connect_artifactory_username else omit }}'
        url_password: '{{ connect_artifactory_password if connect_artifactory_password else omit }}'
        force_basic_auth: '{{ true if connect_artifactory_username else false }}'

    - name: Install Posit Connect (RedHat)
      when: ansible_facts['os_family'] == 'RedHat'
      ansible.builtin.dnf:
        name: '/tmp/connect-{{ connect_general_version }}.{{ binary_type }}'
        disable_gpg_check: true
        state: present

    - name: Install Posit Connect (Ubuntu)
      when: ansible_distribution == 'Ubuntu'
      ansible.builtin.apt:
        deb: '/tmp/connect-{{ connect_general_version }}.{{ binary_type }}'

    - name: Cleanup downloaded assets
      ansible.builtin.file:
        path: '/tmp/connect-{{ connect_general_version }}.{{ binary_type }}'
        state: absent
