# User environment configuration (SSH agent, PATH, GPG)

- name: Ensure OpenSSH client is installed (RedHat)
  ansible.builtin.dnf:
    name: openssh-clients
    state: present
  when:
    - workbench_user_env_enabled | default(true)
    - ansible_facts['os_family'] == 'RedHat'

- name: Ensure OpenSSH client is installed (Debian)
  ansible.builtin.apt:
    name: openssh-client
    state: present
  when:
    - workbench_user_env_enabled | default(true)
    - ansible_facts['os_family'] == 'Debian'

- name: Configure user environment (bash/zsh)
  ansible.builtin.blockinfile:
    path: /etc/profile.d/user-env.sh
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - workbench user env"
    block: |
      # Add user local bin to PATH
      if [ -d "$HOME/.local/bin" ]; then
        export PATH="$HOME/.local/bin:$PATH"
      fi

      # Ensure GPG_TTY is set for pinentry (commit signing)
      export GPG_TTY=$(tty)

      # Persistent ssh-agent: reuse existing or start new (force override)
      if [ -d "$XDG_RUNTIME_DIR" ]; then
        SSH_AGENT_SOCK="$XDG_RUNTIME_DIR/ssh-agent.sock"
      else
        SSH_AGENT_SOCK="/tmp/ssh-agent-${USER}.sock"
      fi
      export SSH_AUTH_SOCK="$SSH_AGENT_SOCK"
      if [ ! -S "$SSH_AGENT_SOCK" ]; then
        rm -f "$SSH_AGENT_SOCK"
        eval $(ssh-agent -s -a "$SSH_AGENT_SOCK") >/dev/null 2>&1
      fi
      # Auto-add default key if exists and not yet added
      if [ -f "$HOME/.ssh/id_ed25519" ] && ! ssh-add -l >/dev/null 2>&1; then
        ssh-add "$HOME/.ssh/id_ed25519" 2>/dev/null
      fi
  when: workbench_user_env_enabled | default(true)

- name: Ensure fish system config directory exists
  ansible.builtin.file:
    path: /etc/fish/conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: workbench_user_env_enabled | default(true)

- name: Configure user environment (fish)
  ansible.builtin.blockinfile:
    path: /etc/fish/conf.d/user-env.fish
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - workbench user env"
    block: |
      # Add user local bin to PATH
      if test -d $HOME/.local/bin
        fish_add_path --prepend $HOME/.local/bin
      end

      # Ensure GPG_TTY is set for pinentry (commit signing)
      set -gx GPG_TTY (tty)

      # Persistent ssh-agent: reuse existing or start new (force override)
      set -l SSH_AGENT_SOCK /tmp/ssh-agent-$USER.sock
      if set -q XDG_RUNTIME_DIR; and test -d $XDG_RUNTIME_DIR
        set SSH_AGENT_SOCK $XDG_RUNTIME_DIR/ssh-agent.sock
      end
      set -gx SSH_AUTH_SOCK $SSH_AGENT_SOCK
      if not test -S $SSH_AGENT_SOCK
        rm -f $SSH_AGENT_SOCK
        eval (ssh-agent -c -a $SSH_AGENT_SOCK) >/dev/null 2>&1
      end
      # Auto-add default key if exists and not yet added
      if test -f $HOME/.ssh/id_ed25519; and not ssh-add -l >/dev/null 2>&1
        ssh-add $HOME/.ssh/id_ed25519 2>/dev/null
      end
  when: workbench_user_env_enabled | default(true)
