# handlers file for workbench

- name: Encrypt OIDC client secret
  when: workbench_server_oidc_client_secret is defined
  ansible.builtin.include_tasks: 01_secret_oidc.yaml

- name: Restart rstudio-server service
  ansible.builtin.service:
    name: rstudio-server
    state: restarted
    enabled: true
  register: result
  failed_when: result.failed or "'Could not find the requested service' in result.msg"

- name: Restart rstudio-launcher service
  ansible.builtin.service:
    name: rstudio-launcher
    state: restarted
    enabled: true
  register: result
  failed_when: result.failed or "'Could not find the requested service' in result.msg"
