# cSpell:ignore checkmake hadolint autofix autoupdate
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
  # - repo: https://github.com/DavidAnson/markdownlint-cli2
  #   rev: v0.14.0
  #   hooks:
  #     - id: markdownlint-cli2
  #       args: ["--glob", "!ansible_collections/**/**/*.md$"]
  # - repo: https://github.com/thegeeklab/ansible-doctor
  #   rev: v6.0.2
  #   hooks:
  #     - id: ansible-doctor
  #       args: ["ansible_collections/devxy/posit/roles", "-r"]
  # - repo: https://github.com/pre-commit/mirrors-prettier
  #   rev: v4.0.0-alpha.8
  #   hooks:
  #     - id: prettier
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict, -c=.yamllint.yaml]
  # - repo: local
  #   hooks:
  #     - id: yaml-file-extension
  #       name: Check if YAML files has *.yaml extension.
  #       entry: YAML filenames must have .yaml extension.
  #       language: fail
  #       files: .yml$

  - repo: https://github.com/ansible-community/ansible-lint
    rev: v6.22.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
