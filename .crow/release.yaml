when:
  - event: tag

clone:
  git:
    image: docker.io/woodpeckerci/plugin-git:2.6.5
    settings:
      tags: true

depends_on:
  - lint

steps:
  release-collection:
    environment:
      GALAXY_TOKEN:
        from_secret: GALAXY_TOKEN
    image: alpine/ansible:2.18.6
    commands:
      - apk add py3-distlib
      # replace version in galaxy.yml
      - "sed -i 's/version: .*/version: ${CI_COMMIT_TAG#v}/' galaxy.yml"
      - ansible-galaxy collection build
      - export tarball=$(ls | grep devxy-)
      - ansible-galaxy collection install $tarball
      - ansible-galaxy collection publish --token $GALAXY_TOKEN $tarball

  changelog:
    image: docker.io/thegeeklab/git-sv:2.0.3
    commands:
      - apk add --no-cache -q sed
      - git sv current-version
      - git sv release-notes -t ${CI_COMMIT_TAG} -o CHANGELOG.md
      - sed -i '1,2d' CHANGELOG.md # remove version
      - cat CHANGELOG.md
    when:
      event: tag

  "Create release":
    image: docker.io/woodpeckerci/plugin-release:0.2.5
    settings:
      note: CHANGELOG.md
      api_key:
        from_secret: devxy_bot_token
      files:
        - dist/*.tar.gz
      title: ${CI_COMMIT_TAG}
    when:
      event: tag

  "Push changes to repo":
    image: docker.io/appleboy/drone-git-push:1.1.1
    settings:
      remote: ${CI_REPO_CLONE_SSH_URL}
      branch: main
      commit: true
      ssh_key:
        from_secret: devxy_bot_ssh_key
      commit_message: "[skip ci] Update galaxy.yml after release"
      commit_author: devxy-bot
      commit_author_email: no-reply@devxy.io
    when:
      - event: tag
