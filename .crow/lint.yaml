when:
  - event: pull_request
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: tag

steps:
  - name: editorconfig
    image: reg.devxy.io/docker.io/mstruebing/editorconfig-checker:v3.4.0
    depends_on: []

  - name: prettier
    image: reg.devxy.io/docker.io/woodpeckerci/plugin-prettier:1.3.1
    pull: true
    depends_on: []
    settings:
      plugins:
        - "prettier-plugin-tailwindcss"
        - "@ianvs/prettier-plugin-sort-imports"

  - name: commitlint
    when:
      - event: pull_request
      - event: pull_request_edited
    image: reg.devxy.io/docker.io/commitlint/commitlint:19.9.1
    commands:
      - echo $${CI_COMMIT_PULL_REQUEST_TITLE} | commitlint
