when:
  - event: pull_request
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: tag

steps:
  - name: editorconfig
    image: mstruebing/editorconfig-checker:v3.3.0
    depends_on: []

  - name: prettier
    image: docker.io/woodpeckerci/plugin-prettier:1.3.0
    pull: true
    depends_on: []
    settings:
      plugins:
        - "prettier-plugin-tailwindcss"
        - "@ianvs/prettier-plugin-sort-imports"

  - name: commitlint
    when:
      - event: pull_request
      - event: pull_request_edited
    image: commitlint/commitlint:19.8.1
    commands:
      - echo $${CI_COMMIT_PULL_REQUEST_TITLE} | commitlint
