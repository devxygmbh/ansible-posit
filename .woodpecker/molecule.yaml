when:
  event: [push, cron, manual]

steps:
  - name: Build
    image: library/docker:26.1.4-dind-alpine3.20 # agent on k8s
    # image: alpine:3.20 # agent on VM
    privileged: true
    environment:
      # force output of ANSI colors
      PY_COLORS: 1
      DOCKER_HOST: tcp://docker:2375
    commands:
      - apk add -q --no-cache
        python3 python3-dev py3-pip gcc git curl build-base
        autoconf automake py3-cryptography linux-headers
        musl-dev libffi-dev openssl-dev openssh
      - python3 --version
      - python3 -m venv ~/venv/ansible-molecule
      - source ~/venv/ansible-molecule/bin/activate
      - python3 -m pip install -q 'ansible-core<2.17' molecule-plugins[docker]
      - ansible --version
      - molecule --version
      - cd ansible_collections/devxy/core/extensions
      - molecule test
    backend_options:
      kubernetes:
        resources:
          requests:
            memory: 300Mi
            cpu: 500m
          limits:
            memory: 1000Mi
            cpu: 4000m
        nodeSelector:
          kubernetes.io/arch: "arm64"

  - name: "ntfy"
    image: codeberg.org/l-x/woodpecker-ntfy:1.3.1
    when:
      - status: [failure]
    settings:
      url: https://ntfy.devxy.io/ci-builds
      token:
        from_secret: ntfy_token
      title: "CI '${CI_REPO}' failed"
      actions: view, Open build, ${CI_PIPELINE_URL}, clear=false;
      click: ${CI_BUILD_LINK}
      message: |
        Workflow: ${CI_WORKFLOW_NAME/\n//}
        Commit message: ${CI_COMMIT_MESSAGE/\n//}
        Commit Author: ${CI_COMMIT_AUTHOR/\n//}

services:
  docker:
    environment:
      DOCKER_TLS_CERTDIR: ""
    image: docker:26-dind
    commands: dockerd --tls=false --host=tcp://0.0.0.0:2375
    privileged: true
    ports:
      - 2375
    backend_options:
      kubernetes:
        resources:
          requests:
            memory: 600Mi
            cpu: 500m
          limits:
            memory: 1000Mi
            cpu: 4000m
        nodeSelector:
          kubernetes.io/arch: "arm64"
