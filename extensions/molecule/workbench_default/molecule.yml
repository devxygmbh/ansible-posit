role_name_check: 1
lint: |
  set -e
  yamllint .
  ansible-lint
driver:
  name: docker
platforms:
  - name: almalinux-9
    image: "devxygmbh/almalinux9-ansible"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
  - name: ubuntu-2404
    image: "devxygmbh/ubuntu2404-ansible"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  # ansible_args:
  #   - -vvv
  env:
    ANSIBLE_ROLES_PATH: ../../../roles
  playbooks:
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
