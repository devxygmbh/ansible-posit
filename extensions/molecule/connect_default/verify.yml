- name: Verify
  hosts: all
  become: false
  gather_facts: false

  tasks:
    - name: Check if rstudio-connect config directory exists
      ansible.builtin.stat:
        path: /etc/rstudio-connect
      register: config_dir

    - name: Assert config directory exists
      ansible.builtin.assert:
        that:
          - config_dir.stat.exists
          - config_dir.stat.isdir
        fail_msg: "Config directory /etc/rstudio-connect does not exist"

    - name: Check if rstudio-connect.gcfg exists
      ansible.builtin.stat:
        path: /etc/rstudio-connect/rstudio-connect.gcfg
      register: config_file

    - name: Assert config file exists
      ansible.builtin.assert:
        that:
          - config_file.stat.exists
        fail_msg: "Config file /etc/rstudio-connect/rstudio-connect.gcfg does not exist"

    - name: Check if connect binary exists
      ansible.builtin.stat:
        path: /opt/rstudio-connect/bin/connect
      register: connect_binary

    - name: Assert connect binary exists
      ansible.builtin.assert:
        that:
          - connect_binary.stat.exists
        fail_msg: "Connect binary /opt/rstudio-connect/bin/connect does not exist"
