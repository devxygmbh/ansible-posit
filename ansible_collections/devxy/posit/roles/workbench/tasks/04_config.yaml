- name: Apply Posit Workbench configuration (/etc/rstudio)
  ansible.builtin.template:
    src: "{{ item.file }}.j2"
    dest: "/etc/rstudio/{{ item.file }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { file: "database.conf", mode: "0600", restart: "Restart rstudio-server service" }
    - { file: "jupyter.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "launcher.conf", mode: "0644", restart: "Restart rstudio-launcher service"}
    - { file: "logging.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "notifications.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "rserver.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "rsession.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "vscode.conf", mode: "0644", restart: "Restart rstudio-server service" }
    - { file: "vscode.extensions.conf", mode: "0644", restart: "Restart rstudio-server service" }
  notify:
    - "{{ item.restart }}"

- name: Add static files
  ansible.builtin.copy:
    src: "{{ item.name }}"
    dest: "/etc/rstudio/{{ item.name }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { name: "vscode-user-settings.json", mode: "0644" }
